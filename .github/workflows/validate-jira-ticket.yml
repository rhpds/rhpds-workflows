name: Validate Jira Ticket

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Jira ticket in PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "================================================"
          echo "🔍 VALIDATING JIRA TICKET"
          echo "================================================"

          # Extract Jira ticket from PR body
          # Supports both form-based templates (### Jira Ticket\n\nTICKET-123)
          # and markdown templates (**Jira:** TICKET-123)

          echo ""
          echo "📋 Searching for Jira ticket in PR description..."
          echo ""

          # Try form-based format first
          TICKET=$(echo "$PR_BODY" | grep -A 2 "### Jira Ticket" | grep -oE '[A-Z]+-[0-9]+' | head -1 || echo "")

          # Fallback to markdown format
          if [ -z "$TICKET" ]; then
            TICKET=$(echo "$PR_BODY" | grep -oE '\*\*Jira:\*\*\s*([A-Z]+-[0-9]+)' | grep -oE '[A-Z]+-[0-9]+' || echo "")
          fi

          # Last fallback: just find any ticket pattern in the body
          if [ -z "$TICKET" ]; then
            TICKET=$(echo "$PR_BODY" | grep -oE '[A-Z]+-[0-9]+' | head -1 || echo "")
          fi

          if [ -z "$TICKET" ]; then
            echo "════════════════════════════════════════════════"
            echo "❌ VALIDATION FAILED"
            echo "════════════════════════════════════════════════"
            echo ""
            echo "⚠️  No Jira ticket found in PR description"
            echo ""
            echo "📝 Please update your PR description to include:"
            echo "   **Jira:** GPTEINFRA-1234"
            echo ""
            echo "🔗 Edit your PR here:"
            echo "   ${{ github.event.pull_request.html_url }}"
            echo ""
            echo "📄 Current PR description:"
            echo "---"
            echo "$PR_BODY"
            echo "---"
            echo ""
            echo "════════════════════════════════════════════════"
            exit 1
          fi

          echo "════════════════════════════════════════════════"
          echo "✅ VALIDATION PASSED"
          echo "════════════════════════════════════════════════"
          echo ""
          echo "🎫 Found Jira ticket: $TICKET"
          echo ""
          echo "════════════════════════════════════════════════"

          echo "JIRA_TICKET=$TICKET" >> $GITHUB_ENV
