name: Jira AI Analysis (Reusable)

on:
  workflow_call:
    secrets:
      MAAS_API_KEY:
        required: true
        description: "API key for MAAS Claude endpoint"
      JIRA_API_TOKEN:
        required: true
        description: "Jira API token"
      JIRA_EMAIL:
        required: true
        description: "Jira user email"
    inputs:
      jira_ticket:
        description: "Jira ticket number (optional, will be extracted from PR if not provided)"
        required: false
        type: string

jobs:
  analyze-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for PR diffs

      - name: Extract Jira ticket
        id: check_jira
        env:
          INPUT_TICKET: ${{ inputs.jira_ticket }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          TICKET=""

          # First priority: explicitly provided ticket via input
          if [ -n "$INPUT_TICKET" ]; then
            TICKET="$INPUT_TICKET"
            echo "✅ Using provided Jira ticket: $TICKET"

          # Second priority: extract from PR description
          elif [ -n "$PR_BODY" ]; then
            TICKET=$(echo "$PR_BODY" | grep -oE '\*\*Jira:\*\*\s*([A-Z]+-[0-9]+)' | grep -oE '[A-Z]+-[0-9]+' | head -1 || echo "")
            if [ -n "$TICKET" ]; then
              echo "✅ Found Jira ticket in PR description: $TICKET"
            fi

          # Third priority: check for .jira file (backward compatibility)
          elif [ -f .jira ]; then
            TICKET=$(cat .jira | grep -v '^#' | grep -v '^$' | head -1 | xargs)
            echo "✅ Found Jira ticket in .jira file: $TICKET"
          fi

          if [ -z "$TICKET" ]; then
            echo "⏭️  No Jira ticket found, skipping Jira integration"
          fi

          echo "ticket=$TICKET" >> $GITHUB_OUTPUT

      - name: Get PR diff
        if: steps.check_jira.outputs.ticket != ''
        id: get_diff
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Get the entire PR diff (all changes from base to head)
          git fetch origin "$BASE_REF"
          git fetch origin "$HEAD_REF"

          DIFF=$(git diff "origin/$BASE_REF...origin/$HEAD_REF")

          # Get PR metadata
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "base_branch=$BASE_REF" >> $GITHUB_OUTPUT
          echo "head_branch=$HEAD_REF" >> $GITHUB_OUTPUT

          # Save diff to file
          echo "$DIFF" > /tmp/diff.txt
          echo "✅ Got PR diff: $(echo "$DIFF" | wc -l) lines changed"

      - name: Analyze with Claude AI
        if: steps.check_jira.outputs.ticket != ''
        id: ai_analysis
        env:
          PR_TITLE: ${{ steps.get_diff.outputs.pr_title }}
          PR_NUMBER: ${{ steps.get_diff.outputs.pr_number }}
          BASE_BRANCH: ${{ steps.get_diff.outputs.base_branch }}
          HEAD_BRANCH: ${{ steps.get_diff.outputs.head_branch }}
        run: |
          DIFF=$(cat /tmp/diff.txt)

          # Build the AI prompt for PR analysis
          PROMPT="Analyze this Pull Request and provide:
          1. A brief summary of changes (2-3 sentences)
          2. Potential impact or risks
          3. Testing recommendations

          Pull Request: #$PR_NUMBER - $PR_TITLE
          Branch: $HEAD_BRANCH → $BASE_BRANCH

          Code Changes:
          $DIFF

          Please be concise and focus on what matters for the Jira ticket."

          # Call MAAS API
          RESPONSE=$(curl -s -X POST https://maas-rhdp.apps.maas.redhatworkshops.io/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.MAAS_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"claude-opus-4-6\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": $(echo "$PROMPT" | jq -Rs .)
              }],
              \"max_tokens\": 1000
            }")

          # Extract the AI response
          AI_ANALYSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Error: Could not get AI analysis"')

          # Save for next step
          echo "$AI_ANALYSIS" > /tmp/analysis.txt
          echo "✅ AI Analysis complete"

      - name: Update Jira ticket
        if: steps.check_jira.outputs.ticket != ''
        env:
          JIRA_TICKET: ${{ steps.check_jira.outputs.ticket }}
          PR_NUMBER: ${{ steps.get_diff.outputs.pr_number }}
          PR_TITLE: ${{ steps.get_diff.outputs.pr_title }}
        run: |
          AI_ANALYSIS=$(cat /tmp/analysis.txt)
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          PR_URL="$REPO_URL/pull/$PR_NUMBER"

          # Format the comment for Jira (ADF format)
          COMMENT_BODY=$(cat <<EOF
          {
            "body": {
              "type": "doc",
              "version": 1,
              "content": [
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "text",
                      "text": "🤖 AI Analysis of PR #$PR_NUMBER",
                      "marks": [{"type": "strong"}]
                    }
                  ]
                },
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "text",
                      "text": "Repository: ${{ github.repository }}"
                    }
                  ]
                },
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "text",
                      "text": "PR: ",
                      "marks": [{"type": "strong"}]
                    },
                    {
                      "type": "text",
                      "text": "$PR_TITLE",
                      "marks": [{"type": "link", "attrs": {"href": "$PR_URL"}}]
                    }
                  ]
                },
                {
                  "type": "rule"
                },
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "text",
                      "text": "$AI_ANALYSIS"
                    }
                  ]
                }
              ]
            }
          }
          EOF
          )

          # Post to Jira
          AUTH_STRING="${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}"
          AUTH_HEADER=$(echo -n "$AUTH_STRING" | base64)

          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/jira_response.txt \
            -X POST "https://redhat.atlassian.net/rest/api/3/issue/$JIRA_TICKET/comment" \
            -H "Authorization: Basic $AUTH_HEADER" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_BODY")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Successfully updated Jira ticket $JIRA_TICKET"
          else
            echo "❌ Failed to update Jira (HTTP $HTTP_CODE)"
            cat /tmp/jira_response.txt
            exit 1
          fi
