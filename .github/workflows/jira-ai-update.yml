name: Jira AI Analysis (Reusable)

on:
  workflow_call:
    secrets:
      MAAS_API_KEY:
        required: true
        description: "API key for MAAS Claude endpoint"
      JIRA_API_TOKEN:
        required: true
        description: "Jira API token"
      JIRA_EMAIL:
        required: true
        description: "Jira user email"
    inputs:
      jira_ticket:
        description: "Jira ticket number (optional, will be extracted from PR if not provided)"
        required: false
        type: string

jobs:
  analyze-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for PR diffs

      - name: Extract Jira ticket
        id: check_jira
        env:
          INPUT_TICKET: ${{ inputs.jira_ticket }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          TICKET=""

          # First priority: explicitly provided ticket via input
          if [ -n "$INPUT_TICKET" ]; then
            TICKET="$INPUT_TICKET"
            echo "✅ Using provided Jira ticket: $TICKET"

          # Second priority: extract from PR description
          elif [ -n "$PR_BODY" ]; then
            TICKET=$(echo "$PR_BODY" | grep -oE '\*\*Jira:\*\*\s*([A-Z]+-[0-9]+)' | grep -oE '[A-Z]+-[0-9]+' | head -1 || echo "")
            if [ -n "$TICKET" ]; then
              echo "✅ Found Jira ticket in PR description: $TICKET"
            fi

          # Third priority: check for .jira file (backward compatibility)
          elif [ -f .jira ]; then
            TICKET=$(cat .jira | grep -v '^#' | grep -v '^$' | head -1 | xargs)
            echo "✅ Found Jira ticket in .jira file: $TICKET"
          fi

          if [ -z "$TICKET" ]; then
            echo "⏭️  No Jira ticket found, skipping Jira integration"
          fi

          echo "ticket=$TICKET" >> $GITHUB_OUTPUT

      - name: Get PR diff
        if: steps.check_jira.outputs.ticket != ''
        id: get_diff
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "================================================"
          echo "📊 GETTING PR DIFF"
          echo "================================================"

          # Get the entire PR diff using the SHA from before the merge
          # This captures all changes that were in the PR
          echo "Fetching commits..."
          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          git fetch origin "$BASE_SHA" || { echo "❌ Failed to fetch base"; exit 1; }
          git fetch origin "$HEAD_SHA" || { echo "❌ Failed to fetch head"; exit 1; }

          echo "Generating diff..."
          DIFF=$(git diff "$BASE_SHA...$HEAD_SHA")

          # Get PR metadata
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_author=$PR_AUTHOR" >> $GITHUB_OUTPUT

          # Save diff to file
          echo "$DIFF" > /tmp/diff.txt

          LINES_CHANGED=$(echo "$DIFF" | wc -l)
          FILES_CHANGED=$(echo "$DIFF" | grep -c "^diff --git" || echo "0")

          echo ""
          echo "✅ PR diff generated successfully"
          echo "   Lines changed: $LINES_CHANGED"
          echo "   Files changed: $FILES_CHANGED"
          echo "   Commits: $BASE_SHA → $HEAD_SHA"
          echo ""
          echo "================================================"

      - name: Analyze with Claude AI
        if: steps.check_jira.outputs.ticket != ''
        id: ai_analysis
        env:
          PR_TITLE: ${{ steps.get_diff.outputs.pr_title }}
          PR_NUMBER: ${{ steps.get_diff.outputs.pr_number }}
        run: |
          echo "================================================"
          echo "🤖 ANALYZING WITH AI"
          echo "================================================"

          DIFF=$(cat /tmp/diff.txt)

          # Build the AI prompt for PR analysis
          PROMPT="Analyze this Pull Request and provide:
          1. A brief summary of changes (2-3 sentences)
          2. Potential impact or risks
          3. Testing recommendations

          Pull Request: #$PR_NUMBER - $PR_TITLE

          Code Changes:
          $DIFF

          Please be concise and focus on what matters for the Jira ticket."

          echo "Calling MAAS API..."

          # Call MAAS API
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/maas_response.txt \
            -X POST https://maas-rhdp.apps.maas.redhatworkshops.io/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.MAAS_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"claude-opus-4-6\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": $(echo "$PROMPT" | jq -Rs .)
              }],
              \"max_tokens\": 1000
            }")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "════════════════════════════════════════════════"
            echo "❌ MAAS API FAILED"
            echo "════════════════════════════════════════════════"
            echo ""
            echo "HTTP Status Code: $HTTP_CODE"
            echo ""
            echo "Response:"
            cat /tmp/maas_response.txt
            echo ""
            echo "════════════════════════════════════════════════"
            exit 1
          fi

          RESPONSE=$(cat /tmp/maas_response.txt)

          # Extract the AI response
          AI_ANALYSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$AI_ANALYSIS" ]; then
            echo "════════════════════════════════════════════════"
            echo "❌ AI ANALYSIS FAILED"
            echo "════════════════════════════════════════════════"
            echo ""
            echo "Could not extract AI response from MAAS API"
            echo ""
            echo "Full Response:"
            echo "$RESPONSE"
            echo ""
            echo "════════════════════════════════════════════════"
            exit 1
          fi

          # Save for next step
          echo "$AI_ANALYSIS" > /tmp/analysis.txt

          echo ""
          echo "✅ AI analysis completed successfully"
          echo "   Analysis length: ${#AI_ANALYSIS} characters"
          echo ""
          echo "================================================"

      - name: Update Jira ticket
        if: steps.check_jira.outputs.ticket != ''
        env:
          JIRA_TICKET: ${{ steps.check_jira.outputs.ticket }}
          PR_NUMBER: ${{ steps.get_diff.outputs.pr_number }}
          PR_TITLE: ${{ steps.get_diff.outputs.pr_title }}
          PR_AUTHOR: ${{ steps.get_diff.outputs.pr_author }}
        run: |
          echo "================================================"
          echo "📝 UPDATING JIRA TICKET"
          echo "================================================"

          AI_ANALYSIS=$(cat /tmp/analysis.txt)
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          PR_URL="$REPO_URL/pull/$PR_NUMBER"
          AUTHOR_URL="https://github.com/$PR_AUTHOR"

          echo "Ticket: $JIRA_TICKET"
          echo "PR: #$PR_NUMBER - $PR_TITLE"
          echo "Author: $PR_AUTHOR"
          echo ""

          # Format the comment for Jira (ADF format)
          COMMENT_BODY=$(cat <<EOF
          {
            "body": {
              "type": "doc",
              "version": 1,
              "content": [
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "text",
                      "text": "🤖 AI Analysis of PR #$PR_NUMBER",
                      "marks": [{"type": "strong"}]
                    }
                  ]
                },
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "text",
                      "text": "Repository: ${{ github.repository }}"
                    }
                  ]
                },
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "text",
                      "text": "PR: ",
                      "marks": [{"type": "strong"}]
                    },
                    {
                      "type": "text",
                      "text": "$PR_TITLE",
                      "marks": [{"type": "link", "attrs": {"href": "$PR_URL"}}]
                    }
                  ]
                },
                {
                  "type": "rule"
                },
                {
                  "type": "paragraph",
                  "content": [
                    {
                      "type": "text",
                      "text": "$AI_ANALYSIS"
                    }
                  ]
                }
              ]
            }
          }
          EOF
          )

          echo "Posting comment to Jira..."

          # Properly escape AI analysis for JSON
          AI_ESCAPED=$(echo "$AI_ANALYSIS" | jq -Rs .)

          # Build JSON with properly escaped content
          FINAL_BODY=$(jq -n \
            --arg pr_num "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_author "$PR_AUTHOR" \
            --arg repo "${{ github.repository }}" \
            --arg pr_url "$PR_URL" \
            --arg author_url "$AUTHOR_URL" \
            --arg analysis "$AI_ANALYSIS" \
            '{
              body: {
                type: "doc",
                version: 1,
                content: [
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: ("🤖 AI Analysis of PR #" + $pr_num),
                      marks: [{type: "strong"}]
                    }]
                  },
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: ("Repository: " + $repo)
                    }]
                  },
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: "Author: "
                    }, {
                      type: "text",
                      text: ("@" + $pr_author),
                      marks: [{type: "link", attrs: {href: $author_url}}]
                    }]
                  },
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: "PR: ",
                      marks: [{type: "strong"}]
                    }, {
                      type: "text",
                      text: $pr_title,
                      marks: [{type: "link", attrs: {href: $pr_url}}]
                    }]
                  },
                  {type: "rule"},
                  {
                    type: "paragraph",
                    content: [{
                      type: "text",
                      text: $analysis
                    }]
                  }
                ]
              }
            }')

          # Post to Jira using API v3 with ADF format
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/jira_response.txt \
            -X POST "https://redhat.atlassian.net/rest/api/3/issue/$JIRA_TICKET/comment" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$FINAL_BODY")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo ""
            echo "════════════════════════════════════════════════"
            echo "✅ JIRA UPDATE SUCCESSFUL"
            echo "════════════════════════════════════════════════"
            echo ""
            echo "🎫 Updated ticket: $JIRA_TICKET"
            echo "🔗 View ticket: https://redhat.atlassian.net/browse/$JIRA_TICKET"
            echo "🔗 View PR: $PR_URL"
            echo ""
            echo "════════════════════════════════════════════════"
          else
            echo ""
            echo "════════════════════════════════════════════════"
            echo "❌ JIRA UPDATE FAILED"
            echo "════════════════════════════════════════════════"
            echo ""
            echo "HTTP Status Code: $HTTP_CODE"
            echo "Ticket: $JIRA_TICKET"
            echo ""
            echo "Response from Jira API:"
            cat /tmp/jira_response.txt
            echo ""
            echo ""
            echo "Request Body (first 1000 chars):"
            echo "$FINAL_BODY" | head -c 1000
            echo ""
            echo "════════════════════════════════════════════════"
            exit 1
          fi
